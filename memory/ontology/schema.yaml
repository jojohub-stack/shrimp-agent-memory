types:
  Person:
    required: [name]
    properties:
      username: { type: string }
      timezone: { type: string }
      language: { type: string }
      email: { type: string }

  Agent:
    required: [name, role]
    properties:
      style: { type: string }

  Project:
    required: [name, status]
    properties:
      path: { type: string }
      status_enum: [active, paused, done]
      description: { type: string }

  TradingPair:
    required: [symbol, status]
    properties:
      status_enum: [active, paused, closed]
      range_pct: { type: number }
      grid_count: { type: integer }

  Trade:
    required: [symbol, action, price, amount, timestamp]
    properties:
      symbol_display: { type: string }
      action_enum: [buy, sell]
      value: { type: number }

  GridAdjustment:
    required: [symbol, timestamp]
    properties:
      symbol_display: { type: string }
      reasons: { type: array }
      old_range: { type: string }
      new_range: { type: string }
      adjustment_number: { type: integer }

  Task:
    required: [title, status]
    properties:
      status_enum: [open, in_progress, blocked, done]
      priority_enum: [high, medium, low]
      due: { type: string }
      assignee: { type: string }

  Decision:
    required: [title, decision, date]
    properties:
      reason: { type: string }
      alternatives: { type: array }

  Lesson:
    required: [content, date]
    properties:
      source: { type: string }
      tags: { type: array }

relations:
  owns:
    from_types: [Person]
    to_types: [Project]
    cardinality: one_to_many

  assists:
    from_types: [Agent]
    to_types: [Person]
    cardinality: many_to_one

  trades:
    from_types: [Project]
    to_types: [TradingPair]
    cardinality: one_to_many

  traded_on:
    from_types: [Trade]
    to_types: [TradingPair]
    cardinality: many_to_one

  adjusts:
    from_types: [GridAdjustment]
    to_types: [TradingPair]
    cardinality: many_to_one

  blocks:
    from_types: [Task]
    to_types: [Task]
    cardinality: many_to_many
    acyclic: true

  depends_on:
    from_types: [Task]
    to_types: [Task]
    cardinality: many_to_many
    acyclic: true

  relates_to:
    from_types: [Lesson]
    to_types: [Project]
    cardinality: many_to_many