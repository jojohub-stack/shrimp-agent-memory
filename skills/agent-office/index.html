<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Agent Office - Star Wars Theme</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(to bottom, #0a0a1a 0%, #1a1a3a 100%);
      min-height: 100vh;
      overflow: hidden;
      position: relative;
    }
    #app { width: 100vw; height: 100vh; position: relative; }
    
    /* 天體 */
    .celestial-body { position: absolute; border-radius: 50%; z-index: 100; pointer-events: none; }
    .neptune { width: 70px; height: 70px; top: 12%; left: 60%; background: linear-gradient(135deg, #6b8cff 0%, #2d4a9e 100%); box-shadow: 0 0 30px rgba(107, 140, 255, 0.5); }
    .jupiter { width: 55px; height: 55px; top: 25%; left: 10%; background: linear-gradient(135deg, #f5d7a8 0%, #8b6b4a 100%); box-shadow: 0 0 25px rgba(245, 215, 168, 0.4); }
    .callisto { width: 25px; height: 25px; bottom: 20%; left: 15%; background: linear-gradient(135deg, #c9b8a8 0%, #7d6858 100%); box-shadow: 0 0 15px rgba(201, 184, 168, 0.3); }
    .saturn { width: 120px; height: 120px; bottom: 10%; right: 10%; background: linear-gradient(135deg, #f4e4c1 0%, #c9a86a 100%); box-shadow: 0 0 40px rgba(244, 228, 193, 0.5); }
    .saturn-ring { position: absolute; width: 180px; height: 60px; border: 8px solid rgba(210, 180, 140, 0.6); border-radius: 50%; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-20deg); }
    
    /* 太空船 */
    .spaceship { position: absolute; top: 40%; left: 45%; font-size: 40px; z-index: 101; animation: float 3s ease-in-out infinite; }
    .ufo { position: absolute; top: 30%; right: 30%; font-size: 35px; z-index: 101; animation: float 4s ease-in-out infinite reverse; }
    
    /* 角色 */
    .pixel-character { position: absolute; width: 40px !important; height: 40px !important; z-index: 50; pointer-events: none; transition: left 0.1s linear, top 0.1s linear; }
    .pixel-character svg { width: 40px !important; height: 40px !important; image-rendering: pixelated; filter: drop-shadow(0 0 5px currentColor); }
    .agent-label { position: absolute; bottom: -18px; left: 50%; transform: translateX(-50%); font-size: 10px; color: white; white-space: nowrap; text-shadow: 0 0 5px rgba(0, 0, 0, 0.8); }
    
    /* 工作效率框 */
    .work-stats {
      position: absolute;
      bottom: 20px;
      left: 20px;
      background: rgba(0, 0, 0, 0.7);
      border: 2px solid #00CED1;
      border-radius: 10px;
      padding: 15px 20px;
      z-index: 200;
      backdrop-filter: blur(10px);
      box-shadow: 0 0 20px rgba(0, 206, 209, 0.3);
      min-width: 280px;
    }
    .work-stats h3 {
      color: #00CED1;
      margin-bottom: 12px;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 1px;
      border-bottom: 1px solid rgba(0, 206, 209, 0.3);
      padding-bottom: 8px;
    }
    .stat-item { display: flex; justify-content: space-between; margin: 8px 0; }
    .stat-value { color: #fff; font-size: 16px; font-weight: bold; }
    .stat-label { color: #aaa; font-size: 12px; }
    
    /* 日誌窗 */
    .log-container {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 400px;
      max-height: 250px;
      background: rgba(0, 0, 0, 0.8);
      border: 2px solid #4169E1;
      border-radius: 10px;
      padding: 15px;
      z-index: 200;
      backdrop-filter: blur(10px);
      box-shadow: 0 0 20px rgba(65, 105, 225, 0.3);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .log-container h3 {
      color: #4169E1;
      margin-bottom: 10px;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 1px;
      border-bottom: 1px solid rgba(65, 105, 225, 0.3);
      padding-bottom: 8px;
    }
    .log-entry {
      display: flex;
      gap: 10px;
      padding: 6px 0;
      font-size: 11px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }
    .log-entry:last-child { border-bottom: none; }
    .log-time { color: #888; min-width: 45px; }
    .log-agent { color: #00CED1; min-width: 70px; font-weight: bold; }
    .log-message { color: #fff; flex: 1; }
    
    /* 動畫 */
    @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
    @keyframes twinkle { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
    
    .stars { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
    .star { position: absolute; background: white; border-radius: 50%; animation: twinkle 2s ease-in-out infinite; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script src="src/App.js?v=2"></script>
</body>
</html>
